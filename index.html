odiacScorpio:()=>Xj,ZodiacScorpioIcon:()=>Xj,ZodiacTaurus:()=>Zj,ZodiacTaurusIcon:()=>Zj,ZodiacVirgo:()=>Qj,ZodiacVirgoIcon:()=>Qj,ZoomIn:()=>$j,ZoomInIcon:()=>$j,ZoomOut:()=>eM,ZoomOutIcon:()=>eM,createLucideIcon:()=>C,icons:()=>tM,useLucideContext:()=>ae}),rM=[{id:`juridica`,name:`Psicologia Jurídica`,color:`#2f6d65`,weekly:210,icon:`Scale`},{id:`avaliacao`,name:`Avaliação Psicológica`,color:`#b7793f`,weekly:150,icon:`ClipboardCheck`},{id:`eca`,name:`ECA`,color:`#7d5975`,weekly:120,icon:`Baby`},{id:`etica`,name:`Ética e CFP`,color:`#426a91`,weekly:105,icon:`ShieldCheck`},{id:`psicopatologia`,name:`Psicopatologia`,color:`#9b5d58`,weekly:90,icon:`Brain`},{id:`portugues`,name:`Língua Portuguesa`,color:`#6d7445`,weekly:90,icon:`BookOpen`},{id:`tjam`,name:`Legislação TJAM`,color:`#64748b`,weekly:75,icon:`Landmark`}],iM=[{id:1,subject:`juridica`,topic:`Perícia e assistência técnica`,text:`Em uma disputa de guarda, o psicólogo perito nomeado pelo juízo e o assistente técnico contratado por uma das partes exercem funções idênticas e estão submetidos ao mesmo grau de imparcialidade processual.`,options:[`Certo`,`Errado`],answer:1,explanation:`O perito atua como auxiliar da Justiça e deve manter imparcialidade. O assistente técnico é profissional de confiança de uma das partes, embora continue obrigado aos limites éticos, técnicos e científicos da Psicologia.`},{id:2,subject:`juridica`,topic:`Varas de Família`,text:`Na avaliação de uma disputa de guarda, qual conduta está mais alinhada à atuação psicológica no Judiciário?`,options:[`Definir juridicamente quem possui melhor direito à guarda`,`Investigar exclusivamente a personalidade dos genitores`,`Compreender vínculos, funções parentais e contexto, oferecendo subsídios técnicos à decisão`,`Promover psicoterapia compulsória durante a perícia`,`Substituir a escuta da criança por relatos dos responsáveis`],answer:2,explanation:`Cabe à Psicologia oferecer subsídios técnicos sobre aspectos psicológicos e relacionais relevantes, sem substituir a decisão jurídica nem confundir avaliação com psicoterapia.`},{id:3,subject:`avaliacao`,topic:`Métodos e instrumentos`,text:`Segundo as diretrizes profissionais, a avaliação psicológica deve ser compreendida como:`,options:[`Aplicação isolada de testes`,`Processo estruturado de investigação de fenômenos psicológicos`,`Entrevista livre sem planejamento prévio`,`Procedimento que sempre produz diagnóstico psicopatológico`,`Atividade que pode ser delegada integralmente a outro profissional`],answer:1,explanation:`Avaliação psicológica é um processo estruturado, sustentado por métodos, técnicas e instrumentos reconhecidos cientificamente. Não se reduz a testes nem exige diagnóstico em todos os casos.`},{id:4,subject:`etica`,topic:`Sigilo`,text:`Quando requisitado a depor em juízo sobre atendimento realizado, o psicólogo fica automaticamente liberado do dever de sigilo e deve revelar todo o conteúdo de que tenha conhecimento.`,options:[`Certo`,`Errado`],answer:1,explanation:`A requisição judicial não elimina automaticamente o dever ético. Deve-se avaliar a situação, observar a legislação e limitar eventual comunicação às informações estritamente necessárias.`},{id:5,subject:`eca`,topic:`Medidas de proteção`,text:`As medidas de proteção previstas no ECA podem ser aplicadas quando os direitos da criança ou do adolescente forem ameaçados ou violados por ação ou omissão da sociedade ou do Estado, por falta, omissão ou abuso dos responsáveis, ou em razão de sua própria conduta.`,options:[`Certo`,`Errado`],answer:0,explanation:`A afirmação reproduz as três hipóteses gerais do art. 98 do ECA para incidência das medidas de proteção.`},{id:6,subject:`eca`,topic:`Acolhimento`,text:`Sobre o acolhimento institucional, assinale a alternativa correta:`,options:[`É medida definitiva e equivalente à privação de liberdade`,`Implica automaticamente destituição do poder familiar`,`É medida provisória e excepcional, utilizável como transição para reintegração familiar ou colocação em família substituta`,`Dispensa reavaliação judicial periódica`,`Deve ser priorizado em relação ao acolhimento familiar`],answer:2,explanation:`O ECA define o acolhimento como provisório e excepcional, sem natureza de privação de liberdade. A reintegração familiar é prioritária quando possível e segura.`},{id:7,subject:`juridica`,topic:`Escuta especializada`,text:`A escuta especializada e o depoimento especial são expressões sinônimas para o mesmo procedimento, ambos realizados necessariamente perante autoridade judicial com finalidade de produção de prova.`,options:[`Certo`,`Errado`],answer:1,explanation:`A Lei 13.431/2017 diferencia os procedimentos. A escuta especializada ocorre perante órgão da rede de proteção e limita-se ao necessário para sua finalidade; o depoimento especial é a oitiva perante autoridade policial ou judiciária.`},{id:8,subject:`etica`,topic:`Documentos psicológicos`,text:`Qual documento psicológico tem por finalidade comunicar a atuação profissional desenvolvida, podendo apresentar procedimentos, análise e conclusão, sem finalidade de produzir diagnóstico psicológico?`,options:[`Atestado psicológico`,`Declaração`,`Relatório psicológico`,`Parecer psicológico`,`Prontuário`],answer:2,explanation:`O relatório comunica a atuação e seus resultados, mas não tem por finalidade produzir diagnóstico psicológico, diferentemente do laudo, que decorre de avaliação psicológica.`},{id:9,subject:`avaliacao`,topic:`Laudo psicológico`,text:`No laudo psicológico, a análise deve expor o raciocínio técnico-científico que sustenta as conclusões, preservando dados desnecessários e respeitando a finalidade da avaliação.`,options:[`Certo`,`Errado`],answer:0,explanation:`A fundamentação deve ser coerente com os procedimentos realizados e com a demanda, comunicando apenas o necessário e pertinente à finalidade do documento.`},{id:10,subject:`juridica`,topic:`Alienação parental`,text:`Diante de alegação de alienação parental, a melhor prática psicológica é presumir sua ocorrência a partir da rejeição manifestada pela criança a um dos genitores.`,options:[`Certo`,`Errado`],answer:1,explanation:`A rejeição pode ter múltiplas causas. É necessária avaliação contextual, cuidadosa e não confirmatória, considerando hipóteses alternativas e a proteção integral.`},{id:11,subject:`psicopatologia`,topic:`Exame do estado mental`,text:`A presença de delírio, por si só, permite concluir automaticamente pela incapacidade civil total da pessoa avaliada.`,options:[`Certo`,`Errado`],answer:1,explanation:`Sintoma psicopatológico e capacidade civil não são equivalentes. A análise deve ser funcional, contextual e relacionada aos atos específicos, cabendo ao magistrado a decisão jurídica.`},{id:12,subject:`psicopatologia`,topic:`Trauma`,text:`Em contexto de violência, inconsistências periféricas no relato de uma vítima comprovam que a narrativa é falsa, pois memórias traumáticas são necessariamente lineares e detalhadas.`,options:[`Certo`,`Errado`],answer:1,explanation:`Memórias de eventos traumáticos podem apresentar fragmentação e variações. O psicólogo não deve usar um único indicador como prova de veracidade ou falsidade.`},{id:13,subject:`eca`,topic:`Medidas socioeducativas`,text:`A internação de adolescente constitui medida privativa de liberdade regida pelos princípios de brevidade, excepcionalidade e respeito à condição peculiar de pessoa em desenvolvimento.`,options:[`Certo`,`Errado`],answer:0,explanation:`São princípios expressamente associados à internação pelo ECA e pela Constituição.`},{id:14,subject:`juridica`,topic:`Adoção`,text:`No processo de adoção, a equipe interprofissional deve produzir avaliação que:`,options:[`Garanta o deferimento quando os candidatos tenham renda alta`,`Busque prever com certeza absoluta o sucesso da adoção`,`Analise capacidades, motivações, expectativas e condições relacionais, sem idealização de um perfil familiar único`,`Selecione famílias pela semelhança física com a criança`,`Realize psicoterapia obrigatória como parte da perícia`],answer:2,explanation:`A avaliação é contextual e busca subsidiar a decisão e a preparação dos envolvidos, sem critérios discriminatórios nem promessa de previsão absoluta.`},{id:15,subject:`etica`,topic:`Relações com a Justiça`,text:`O psicólogo pode emitir conclusão sobre matéria jurídica — por exemplo, afirmar quem é culpado ou decretar a guarda — desde que tenha realizado entrevistas suficientes.`,options:[`Certo`,`Errado`],answer:1,explanation:`O profissional deve limitar-se à matéria psicológica e às competências de sua profissão. A decisão jurídica pertence à autoridade competente.`},{id:16,subject:`avaliacao`,topic:`Testes psicológicos`,text:`Na escolha de um teste para avaliação forense, basta que ele esteja favorável no SATEPSI, sendo dispensável analisar adequação ao construto, público, contexto e finalidade.`,options:[`Certo`,`Errado`],answer:1,explanation:`O parecer favorável é requisito, não garantia automática de adequação. O psicólogo deve justificar a escolha conforme finalidade, contexto, evidências e características das pessoas avaliadas.`},{id:17,subject:`portugues`,topic:`Concordância`,text:`Assinale a frase redigida de acordo com a norma-padrão:`,options:[`Fazem dois anos que o processo tramita.`,`Houveram diversas entrevistas com a família.`,`Devem existir elementos suficientes nos autos.`,`Tratam-se de documentos sigilosos.`,`É necessário as avaliações complementares.`],answer:2,explanation:`O verbo existir concorda com “elementos”. “Fazer” temporal e “haver” no sentido de existir são impessoais; “tratar-se de” fica no singular; o predicativo deveria concordar em “são necessárias”.`},{id:18,subject:`portugues`,topic:`Coesão`,text:`Em “A equipe realizou entrevistas e analisou os autos; contudo, não encontrou elementos conclusivos”, o conectivo “contudo” expressa:`,options:[`Causa`,`Conclusão`,`Adição`,`Oposição`,`Explicação`],answer:3,explanation:`“Contudo” é conjunção adversativa e introduz ideia de contraste ou oposição.`},{id:19,subject:`tjam`,topic:`Estrutura institucional`,text:`A Coordenadoria da Infância e da Juventude do TJAM foi instituída como órgão permanente de assessoria à Presidência, com atuação ligada às políticas judiciárias de infância e juventude.`,options:[`Certo`,`Errado`],answer:0,explanation:`A Resolução TJAM nº 20-A/2010 instituiu a Coordenadoria nesse formato; o texto foi posteriormente alterado, inclusive pela Resolução nº 33/2024.`},{id:20,subject:`juridica`,topic:`Violência doméstica`,text:`Em atendimento no contexto da Lei Maria da Penha, o psicólogo deve condicionar o acolhimento à decisão imediata da mulher de romper a relação, pois a permanência caracteriza falta de adesão.`,options:[`Certo`,`Errado`],answer:1,explanation:`A atuação deve evitar culpabilização, respeitar autonomia e considerar ciclo da violência, riscos, rede de apoio e barreiras materiais e subjetivas.`},{id:21,subject:`eca`,topic:`Convivência familiar`,text:`A manutenção ou reintegração da criança ou adolescente à família de origem tem preferência em relação a qualquer outra providência, desde que compatível com sua proteção e interesse.`,options:[`Certo`,`Errado`],answer:0,explanation:`O ECA prioriza a convivência familiar e a reintegração segura, com apoio e acompanhamento, sem transformar essa preferência em retorno automático a situação de risco.`},{id:22,subject:`avaliacao`,topic:`Entrevista devolutiva`,text:`A pessoa submetida à avaliação psicológica tem direito a receber informações sobre o trabalho realizado e seus resultados, observados a finalidade, os limites técnicos e as particularidades do contexto forense.`,options:[`Certo`,`Errado`],answer:0,explanation:`A comunicação de resultados integra os deveres profissionais, adaptada ao contexto e sem revelar dados de terceiros ou informações incompatíveis com a finalidade.`},{id:23,subject:`etica`,topic:`Guarda de material`,text:`Documentos e materiais que fundamentam a prestação de serviços psicológicos devem ser guardados pelo prazo mínimo previsto nas normas profissionais, sob responsabilidade do psicólogo e, quando for o caso, da instituição.`,options:[`Certo`,`Errado`],answer:0,explanation:`A Resolução CFP nº 06/2019 remete à guarda mínima de cinco anos, ressalvadas normas supervenientes e situações que exijam prazo maior.`},{id:24,subject:`juridica`,topic:`Equipe interprofissional`,text:`A interdisciplinaridade autoriza que o psicólogo assine conclusões próprias do Serviço Social, desde que participe de reunião conjunta.`,options:[`Certo`,`Errado`],answer:1,explanation:`O trabalho pode ser integrado, mas cada profissão preserva sua autonomia, responsabilidade, métodos e limites. Documentos conjuntos devem discriminar contribuições e competências.`},{id:25,subject:`psicopatologia`,topic:`Diagnóstico diferencial`,text:`Na avaliação forense, formular hipóteses alternativas e buscar dados que possam refutar a hipótese inicial reduz o viés confirmatório.`,options:[`Certo`,`Errado`],answer:0,explanation:`A investigação de hipóteses concorrentes e evidências contraditórias fortalece a qualidade do raciocínio técnico.`},{id:26,subject:`portugues`,topic:`Crase`,text:`Assinale a opção em que o uso da crase está correto:`,options:[`O laudo foi entregue à juíza responsável.`,`A equipe ficou frente à frente com as partes.`,`O atendimento ocorreu de segunda à sexta.`,`O psicólogo começou à entrevistar a família.`,`A medida se aplica à qualquer adolescente.`],answer:0,explanation:`Há fusão da preposição exigida por “entregue” com o artigo feminino de “juíza”. Não há crase antes de verbo, pronome indefinido ou em locução com termos repetidos.`},{id:27,subject:`tjam`,topic:`Concurso de referência`,text:`No concurso do TJAM de 2019, organizado pelo Cebraspe, a prova objetiva para Analista Judiciário teve 120 itens, sendo 40 de conhecimentos básicos e 80 de conhecimentos específicos.`,options:[`Certo`,`Errado`],answer:0,explanation:`Essa foi a estrutura divulgada oficialmente pelo TJAM para o certame de 2019. Um novo edital poderá adotar formato diferente.`},{id:28,subject:`juridica`,topic:`Produção de prova`,text:`O psicólogo deve declarar a veracidade factual de uma denúncia de abuso sempre que os indicadores emocionais da criança forem compatíveis com trauma.`,options:[`Certo`,`Errado`],answer:1,explanation:`Indicadores emocionais não são específicos o bastante para comprovar um fato. O psicólogo descreve achados e limites, sem assumir função investigativa ou judicial que extrapole sua competência.`},{id:29,subject:`eca`,topic:`Participação`,text:`A opinião da criança ou do adolescente deve ser considerada nos procedimentos que lhe digam respeito, de acordo com seu estágio de desenvolvimento e grau de compreensão.`,options:[`Certo`,`Errado`],answer:0,explanation:`A participação e a escuta adequada são componentes do direito à convivência familiar e das decisões protetivas, sem transferir à criança a responsabilidade decisória.`},{id:30,subject:`etica`,topic:`Impedimentos`,text:`É eticamente adequado atuar como perito em processo que envolve pessoa atendida anteriormente em psicoterapia, desde que o atendimento tenha ocorrido há mais de um ano.`,options:[`Certo`,`Errado`],answer:1,explanation:`Não existe prazo automático que elimine conflito de papéis. O profissional deve avaliar impedimento, vínculo prévio, prejuízo à isenção e riscos às pessoas envolvidas.`},{id:31,subject:`avaliacao`,topic:`Fontes de informação`,text:`Em avaliação psicológica forense, dados provenientes dos autos, entrevistas, observações e instrumentos podem ser integrados, desde que sua pertinência, qualidade e limites sejam analisados.`,options:[`Certo`,`Errado`],answer:0,explanation:`A integração crítica de múltiplas fontes é adequada; divergências devem ser examinadas, e não apagadas.`},{id:32,subject:`psicopatologia`,topic:`Simulação`,text:`A suspeita de simulação deve ser concluída a partir de uma única discrepância observada na entrevista.`,options:[`Certo`,`Errado`],answer:1,explanation:`Conclusões dessa natureza exigem convergência de dados, análise contextual e cautela. Uma discrepância isolada não basta.`}],aM=[{id:`guarda`,title:`Guarda e conflito parental`,tag:`Varas de Família`,prompt:`Após a separação, Laura e Marcos disputam a guarda de uma filha de 9 anos. A criança passou a recusar encontros com o pai. A mãe atribui a recusa a episódios de agressividade; o pai afirma haver alienação parental. Existem mensagens contraditórias, histórico de conflito intenso e nenhum registro conclusivo de violência. Como psicólogo do Tribunal, descreva o planejamento da avaliação, as fontes de informação, os cuidados éticos e os limites das conclusões.`,checklist:[`Diferencia decisão jurídica de conclusão psicológica`,`Evita hipótese única e viés confirmatório`,`Prevê escuta adequada da criança`,`Integra múltiplas fontes de informação`,`Aborda sigilo, registro e devolutiva`,`Explicita limites e riscos de revitimização`]},{id:`acolhimento`,title:`Reintegração familiar`,tag:`Infância e Juventude`,prompt:`Dois irmãos, de 6 e 12 anos, estão acolhidos há oito meses após situação de negligência associada ao uso abusivo de álcool pela responsável. A mãe aderiu parcialmente ao tratamento e retomou moradia, mas a rede relata oscilações. Elabore uma resposta técnica sobre como avaliar a possibilidade de reintegração familiar, articulando proteção integral, convivência familiar, participação das crianças e trabalho em rede.`,checklist:[`Prioriza proteção sem idealizar o acolhimento`,`Avalia capacidades parentais no contexto real`,`Inclui a voz das crianças sem responsabilizá-las`,`Considera rede, território e fatores de proteção`,`Propõe acompanhamento e reavaliação`,`Distingue risco atual de julgamento moral`]},{id:`violencia`,title:`Violência doméstica e risco`,tag:`Lei Maria da Penha`,prompt:`Uma mulher procura atendimento após reiteradas ameaças do ex-companheiro. Ela demonstra ambivalência quanto a medidas protetivas, depende financeiramente dele e teme represálias contra os filhos. Apresente os princípios que devem orientar o acolhimento e a avaliação de risco, indicando como evitar culpabilização e respeitar a autonomia sem minimizar o perigo.`,checklist:[`Reconhece ciclo e dinâmica da violência`,`Avalia risco imediato e proteção dos filhos`,`Respeita autonomia sem omissão protetiva`,`Articula rede intersetorial`,`Evita culpabilização`,`Registra apenas informações pertinentes`]}],oM=o((e=>{var t=Symbol.for(`react.transitional.element`),n=Symbol.for(`react.fragment`);function r(e,n,r){var i=null;if(r!==void 0&&(i=``+r),n.key!==void 0&&(i=``+n.key),`key`in n)for(var a in r={},n)a!==`key`&&(r[a]=n[a]);else r=n;return n=r.ref,{$$typeof:t,type:e,key:i,ref:n===void 0?null:n,props:r}}e.Fragment=n,e.jsx=r,e.jsxs=r})),$=o(((e,t)=>{t.exports=oM()}))(),{LayoutDashboard:sM,Timer:cM,ListChecks:lM,Route:uM,NotebookPen:dM,BarChart3:fM,Settings:pM,Search:mM,Bell:hM,Play:gM,Pause:_M,Square:vM,Clock3:yM,Flame:bM,Landmark:xM,ChevronRight:SM,ChevronLeft:CM,CheckCircle2:wM,XCircle:TM,Flag:EM,RotateCcw:DM,Sparkles:OM,Moon:kM,Sun:AM,Download:jM,Upload:MM,Plus:NM,BookOpen:PM,Brain:FM,Scale:IM,ClipboardCheck:LM,Baby:RM,ShieldCheck:zM,CalendarDays:BM,Target:VM,Trophy:HM,Copy:UM,Check:WM,FileText:GM,CircleHelp:KM,Menu:qM,X:JM,Trash2:YM,Save:XM,Coffee:ZM,TrendingUp:QM,Minus:$M}=nM,eN=e=>String(e).padStart(2,`0`),tN=e=>`${eN(Math.floor(e/3600))}:${eN(Math.floor(e%3600/60))}:${eN(e%60)}`,nN=e=>e<60?`${e}min`:`${Math.floor(e/60)}h${e%60?` ${e%60}min`:``}`,rN=(e=new Date)=>{let t=new Date(e);return t.setMinutes(t.getMinutes()-t.getTimezoneOffset()),t.toISOString().slice(0,10)},iN=e=>new Date(`${e}T12:00:00`),aN=(e,t)=>Math.max(0,Math.round((iN(t)-iN(e))/864e5)),oN=e=>rM.find(t=>t.id===e)||rM[0];function sN(e,t){let[n,r]=(0,v.useState)(()=>{try{let n=localStorage.getItem(e);return n?JSON.parse(n):typeof t==`function`?t():t}catch{return typeof t==`function`?t():t}});return(0,v.useEffect)(()=>localStorage.setItem(e,JSON.stringify(n)),[e
